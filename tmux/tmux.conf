# Tmux configuration
# Complements Ghostty setup

# Change prefix key to Ctrl+a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Enable mouse support
set -g mouse on

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing with longer repeat time
set-option -g repeat-time 1000
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Split panes: = for horizontal, - for vertical
bind = split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Zoom/unzoom pane
bind z resize-pane -Z

# Switch windows with Alt+1-9 (triggered by Cmd+1-9 from Ghostty)
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Use ghostty terminal type for full font/color support
set -g default-terminal "ghostty"
set -ga terminal-overrides ",ghostty:Tc"

# Clean status bar with Catppuccin Mocha colors
set -g status-position top
set -g status-bg '#1e1e2e'  # Catppuccin base
set -g status-fg '#cdd6f4'  # Catppuccin text
set -g status-left ' #S '  # Session name on left
set -g status-left-style 'fg=#cdd6f4,bg=#313244'  # Subtle gray highlight for session
set -g status-right ''  # Clean right side
set -g status-right-length 0
set -g status-left-length 20

# Auto-rename windows: show dir when idle, process: dir when running a command
set -g automatic-rename on
set -g automatic-rename-format '#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{b:pane_current_path}: #{pane_current_command}}'

# Window status with Catppuccin colors
setw -g window-status-current-format ' #I: #W '
setw -g window-status-current-style 'fg=#1e1e2e,bg=#cba6f7'  # Purple highlight
setw -g window-status-format ' #I: #W '
setw -g window-status-style 'fg=#6c7086,bg=#1e1e2e'  # Muted text

# Pane border colors (split lines)
set -g pane-border-style 'fg=#6c7086'  # Inactive pane borders (muted gray)
set -g pane-active-border-style 'fg=#cba6f7'  # Active pane border (purple)

# Tmux Plugin Manager (TPM) and session restore plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Session restore settings
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'